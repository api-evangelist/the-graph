specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: The Graph
providerId: the-graph
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Indexing
- GraphQL
- Subgraphs
- Multi-chain
- FinOps
- FOCUS
description: The Graph bills query consumption per 100k queries in USD or GRT. Substreams
  bill on data egress; Token API bills per request.
notes: Invoiced via Edge & Node / Subgraph Studio billing.
sources:
- https://thegraph.com/billing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: The Graph (Edge & Node)
serviceCategory: Web3
billingModel:
  pricingCategory: Pay-per-Query
  billingFrequency: Monthly
  billingCurrency: USD/GRT
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: The Graph
  ServiceCategory: Web3
  ProviderName: The Graph
  PublisherName: Edge & Node
  InvoiceIssuerName: The Graph
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: subgraph_queries
  description: GraphQL queries against subgraphs.
  unit: query
  aggregation: sum
  dimensions:
  - api_key
  - subgraph
- name: token_api_requests
  description: Token API REST requests.
  unit: request
  aggregation: sum
  dimensions:
  - api_key
  - endpoint
- name: substream_egress
  description: Substream gRPC bytes streamed.
  unit: byte
  aggregation: sum
  dimensions:
  - substream
principles:
- name: Visibility
  description: Subgraph Studio billing dashboard tracks queries by API key.
- name: Allocation
  description: API key per app/team.
- name: Optimization
  description: Cache GraphQL responses; collapse N+1 queries; choose subgraphs with
    low query weight.
- name: Accountability
  description: API key owners review weekly query burn.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
